<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Cleaning | MAXCLEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #060402; 
            --text-main: #f5f5f5;
            --text-sub: #bdae9e;
            --accent: #f59e0b; 
            --accent-hover: #fbbf24;
            --card-bg: rgba(18, 14, 10, 0.9); 
            --card-border: rgba(245, 158, 11, 0.2);
            --font-family: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            letter-spacing: 0.5px;
        }

        /* СОХРАНЯЕМ СТИЛЬНЫЙ ФОН ИЗ IMAGE_1764E4.PNG */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center;
            filter: sepia(0%) hue-rotate(15deg) brightness(100%) contrast(100%);
        }

        .form-container {
            max-width: 500px;
            width: 90%;
            background: linear-gradient(135deg, rgba(20, 14, 8, 0.95) 0%, rgba(10, 7, 4, 0.95) 100%);
            border: 2px solid var(--accent);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(245, 158, 11, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .form-title {
            font-size: 2em;
            font-weight: 800;
            text-align: center;
            margin-top: 0;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-title span { color: var(--accent); }

        .form-subtitle {
            color: var(--text-sub);
            text-align: center;
            font-size: 0.95em;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        input {
            background-color: rgba(6, 4, 2, 0.7);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 14px;
            color: #ffffff;
            font-family: var(--font-family);
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
            background-color: rgba(20, 14, 8, 0.9);
        }

        /* КНОПКА ОТПРАВКИ */
        .submit-btn {
            width: 100%;
            background-color: var(--accent);
            color: #000000;
            border: none;
            padding: 16px;
            font-weight: 700;
            font-size: 1.1em;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(245, 158, 11, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.2s;
        }
        .back-link:hover { color: #ffffff; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-title">MAX<span>CLEAN</span></div>
        <div class="form-subtitle">Leave your details and we will call you back shortly to confirm your booking.</div>
        
        <!-- ВСТАВЬТЕ СВОЮ ССЫЛКУ ИЗ FORMSPREE В ACTION -->
        <form action="https://formspree.io/f/xjgqaeqg" method="POST">
            
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="780-123-4567">
            </div>

            <div class="form-group">
                <label for="car-year">Car Year</label>
                <input type="number" id="car-year" name="car_year" required placeholder="1900-2026" min="1900" max="2027">
            </div>

            <div class="form-group">
                <label for="car-model">Car Make & Model</label>
                <input type="text" id="car-model" name="car_model" required placeholder="Chevy Malibu">
            </div>

            <button type="submit" class="submit-btn">Request a Call</button>
        </form>

        <a href="index.html" class="back-link">← Back to Prices</a>
    </div>

</body>
</html>
